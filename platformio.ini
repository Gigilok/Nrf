[platformio]
# Aponta para a pasta onde estão os seus arquivos .ino, .cpp e .h
src_dir = nRFBox

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Partição estendida para caber os códigos de WiFi, BLE e rádios
board_build.partitions = huge_app.csv

# Bibliotecas necessárias para a compilação
lib_deps =
    nrf24/RF24 @ ^1.4.7
    olikraus/U8g2 @ ^2.34.18
    adafruit/Adafruit NeoPixel @ ^1.12.0
    lsatan/SmartRC-CC1101-Driver-Lib @ ^2.5.7
    
